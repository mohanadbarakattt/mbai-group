<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    MB AI Group — unified static brand mark.
    Three ascending peaks (frontier — and a nod to Cairo's skyline) tipped by
    a small signal dot (the "AI"), on the canonical rounded-square chip
    geometry (rx ratio 6/22) shared with the MbaiBadge component used across
    sibling MBAI Solutions products (see components/Logo.tsx). Reuse this
    file wherever a static, non-animated logo asset is needed (OG images,
    docs, print, external embeds) instead of re-drawing the mark.
  -->
  <defs>
    <linearGradient id="mbai-mark-ring" x1="26" y1="26" x2="230" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f4cd7c"/>
      <stop offset="55%" stop-color="#e3a83f"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect x="3.5" y="3.5" width="249" height="249" rx="69.8" fill="#0b1022" stroke="url(#mbai-mark-ring)" stroke-width="7"/>
  <polygon points="44,196 96,196 70,140" fill="#e3a83f"/>
  <polygon points="100,196 156,196 128,109" fill="#e3a83f"/>
  <polygon points="160,196 212,196 186,70" fill="#e3a83f"/>
  <circle cx="186" cy="51" r="13.4" fill="#22d3ee"/>
</svg>
