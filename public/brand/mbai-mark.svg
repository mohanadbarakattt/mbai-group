<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    MB AI Group — unified static brand mark.
    Canonical "solid chip" geometry (rounded-square, rx ratio 6/22) shared with
    the MbaiBadge component used across sibling MBAI Solutions products
    (see components/Logo.tsx `variant="chip"` for the live React version, and
    components/Logo.tsx `variant="hero"` for the animated orbital hero mark).
    Reuse this file wherever a static, non-animated logo asset is needed
    (OG images, docs, print, external embeds) instead of re-drawing the mark.
  -->
  <defs>
    <linearGradient id="mbai-mark-ring" x1="26" y1="26" x2="230" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="45%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>
  <rect x="3.5" y="3.5" width="249" height="249" rx="69.8" fill="#0b1022" stroke="url(#mbai-mark-ring)" stroke-width="7"/>
  <text x="128" y="164" text-anchor="middle" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="108" letter-spacing="-5" fill="#ffffff">MB</text>
</svg>
