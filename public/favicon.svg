<svg width="32" height="32" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- MB AI Group — favicon mark. Same "MB" monogram as components/Logo.tsx
       (M's right leg doubles as the B's stem), one ink color, no ring, no
       container. Ink adapts to the browser's color scheme via CSS so the
       transparent mark stays legible on both light and dark tab chrome. -->
  <style>
    path { stroke: #0e0e0d; }
    @media (prefers-color-scheme: dark) {
      path { stroke: #F5F3EF; }
    }
  </style>
  <path d="M63.5,18 A15,15 0 0 1 63.5,48" fill="none" stroke-width="11"/>
  <path d="M63.5,50 A16,16 0 0 1 63.5,82" fill="none" stroke-width="11"/>
  <path d="M20,82 L20,18 L39,47 L58,18 L58,82" fill="none" stroke-width="11" stroke-linecap="square" stroke-linejoin="miter"/>
</svg>
